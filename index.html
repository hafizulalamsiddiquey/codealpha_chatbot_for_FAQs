<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CodeAlpha AI Internship Task 2 — FAQ Chatbot using NLP Cosine Similarity" />
    <title>FAQ Chatbot | CodeAlpha AI Internship</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ══ HEADER ══ -->
    <header class="header">
        <div class="bot-profile">
            <div class="bot-avatar-wrap">
                <div class="bot-avatar-img">🤖</div>
                <span class="status-ring"></span>
            </div>
            <div class="bot-info">
                <div class="bot-name">CodeAlpha AI Assistant</div>
                <div class="bot-status">● Online · NLP Cosine Similarity</div>
            </div>
        </div>
        <div class="header-right">
            <span class="badge badge-task">Task 02 · AI Internship</span>
            <span class="badge badge-nlp">Hafizul alam siddiquey</span>
        </div>
    </header>

    <!-- ══ MAIN WRAPPER ══ -->
    <div class="chat-wrapper">

        <!-- Sidebar: Browse by Category -->
        <aside class="sidebar">
            <div class="sidebar-title">Browse Topics</div>

            <button class="category-btn" onclick="askFromChip('What is artificial intelligence?')">
        🧠 AI Basics <span class="cat-count">5</span>
      </button>
            <button class="category-btn" onclick="askFromChip('What is natural language processing?')">
        💬 NLP <span class="cat-count">5</span>
      </button>
            <button class="category-btn" onclick="askFromChip('What is deep learning?')">
        🔬 Deep Learning <span class="cat-count">4</span>
      </button>
            <button class="category-btn" onclick="askFromChip('What is object detection?')">
        👁 Computer Vision <span class="cat-count">4</span>
      </button>
            <button class="category-btn" onclick="askFromChip('What is Python used for in AI?')">
        🛠 Tools <span class="cat-count">5</span>
      </button>
            <button class="category-btn" onclick="askFromChip('What is supervised learning?')">
        📊 ML Concepts <span class="cat-count">5</span>
      </button>
            <button class="category-btn" onclick="askFromChip('What is CodeAlpha?')">
        🏢 CodeAlpha <span class="cat-count">3</span>
      </button>
        </aside>

        <!-- Chat Panel -->
        <div class="chat-main">
            <div class="chat-messages" id="chatMessages">
                <!-- Messages injected by script.js -->
            </div>

            <!-- Input Bar -->
            <div class="input-bar">
                <input type="text" id="userInput" class="input-field" placeholder="Ask a question about AI or the CodeAlpha internship…" autocomplete="off" spellcheck="true" aria-label="Type your question" />
                <button id="sendBtn" class="send-btn" title="Send (Enter)">➤</button>
                <span class="input-hint">Press <kbd>Enter</kbd> to send</span>
            </div>
        </div>

    </div>
    <!-- /chat-wrapper -->

    <!-- ══ FOOTER ══ -->
    <footer class="footer">
        CodeAlpha AI Internship · Task 02 Hafizul alam siddiquey · FAQ Chatbot · NLP: TF-IDF + Cosine Similarity · 30 FAQs · &copy; 2026
    </footer>

    <!-- Scripts -->
    <script src="faqs.js"></script>
    <script src="script.js"></script>
</body>

</html>
